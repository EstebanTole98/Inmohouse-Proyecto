  <body>
    <header>
      <nav aria-label="Navegación principal">
        <div>
          <a href="../index.html">
            <img class="logo" src="../img/logo.png" alt="Inmohouse - Inicio" />
          </a>
        </div>
        <h1 class="titulo">INMOHOUSE</h1>
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="./alquileres.html">Alquileres</a></li>
          <li><a href="./pozos.html">Pozos</a></li>
          <li><a href="./contacto.html" aria-current="page">Contacto</a></li>
        </ul>
      </nav>
    </header>
    <main class="contacto">
      <section class="contacto-contenedor">
        <h1 class="sr-only">Formulario de contacto</h1>

        <form
          action="/submit"
          method="post"
          id="form-contacto"
          class="contacto-formulario"
        >
          <label for="nombre" class="contacto-label">Nombre</label>
          <input type="text" name="nombre" id="nombre" class="contacto-input" />

          <label for="apellido" class="contacto-label">Apellido</label>
          <input
            type="text"
            name="apellido"
            id="apellido"
            class="contacto-input"
          />

          <label for="celular-o-telefono-fijo" class="contacto-label">
            Celular o teléfono fijo
          </label>
          <input
            type="tel"
            name="celular-o-telefono-fijo"
            id="celular-o-telefono-fijo"
            class="contacto-input"
          />

          <label for="email" class="contacto-label">Email</label>
          <input type="email" name="email" id="email" class="contacto-input" />

          <label for="domicilio" class="contacto-label">Domicilio</label>
          <input
            type="text"
            name="domicilio"
            id="domicilio"
            class="contacto-input"
          />

          <label for="mensaje" class="contacto-label">
            Comentario y horario aproximado de llamada
          </label>
          <textarea
            name="mensaje"
            id="mensaje"
            class="contacto-textarea"
          ></textarea>

          <input type="submit" value="Enviar" class="contacto-boton" />
        </form>
      </section>
    </main>
    <footer>
      <div>
        <p>Encontranos en: Libertad 458, CABA</p>
      </div>
